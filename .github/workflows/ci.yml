---
name: Molecule CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    working-directory: 'hussainweb.chezmoi'

jobs:
  test:
    name: Molecule
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.unreliable }}
    strategy:
      matrix:
        distro:
          - debian13
          - debian12
          - ubuntu2404
          - ubuntu2204
          - rockylinux10
          - rockylinux9
        chezmoi_version: ["v2.70.0"]
        unreliable: [false]
        include:
          - distro: ubuntu2404
            chezmoi_version: ""
            unreliable: true

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'hussainweb.chezmoi'

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install ansible molecule molecule-plugins[docker] yamllint ansible-lint

      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          CHEZMOI_VERSION: ${{ matrix.chezmoi_version }}
